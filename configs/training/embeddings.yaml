model:
  name: "michiyasunaga/BioLinkBERT-base"
  max_seq_length: 512
  output_dir: "models/embeddings/fine-tuned"

training:
  epochs: 3
  batch_size: 32
  learning_rate: 2.0e-5
  warmup_ratio: 0.1
  weight_decay: 0.01
  fp16: true              # mixed precision — halves memory, faster on CUDA
  logging_steps: 50
  eval_steps: 1000
  save_steps: 1000
  save_total_limit: 3
  load_best_model_at_end: true
  metric_for_best_model: "val-retrieval_cosine_ndcg@10"

loss:
  type: "MultipleNegativesRankingLoss"
  scale: 20.0

evaluation:
  max_val_samples: 5000

data:
  train_file: "data/training/train_pairs.jsonl"
  val_file: "data/training/val_pairs.jsonl"

mlflow:
  tracking_uri: "sqlite:///mlflow.db"
  experiment_name: "trialmind-embeddings"
  run_tag: "fine-tuning-v1"
